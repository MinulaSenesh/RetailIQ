version: '3.8'

services:
  retailiq-db:
    image: mysql:8.0
    container_name: retailiq-db
    restart: always
    environment:
      MYSQL_DATABASE: ${DB_NAME:-retailiq}
      MYSQL_ROOT_PASSWORD: ${DB_PASSWORD:-password}
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    networks:
      - retailiq-net
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 5

  retailiq-api:
    build:
      context: ./retailiq-api
      dockerfile: Dockerfile
    container_name: retailiq-api
    restart: always
    environment:
      DB_HOST: retailiq-db
      DB_PORT: 3306
      DB_NAME: ${DB_NAME:-retailiq}
      DB_USER: root
      DB_PASSWORD: ${DB_PASSWORD:-password}
      JWT_SECRET: ${JWT_SECRET:-404E635266556A586E3272357538782F413F4428472B4B6250645367566B5970}
    ports:
      - "8080:8080"
    depends_on:
      retailiq-db:
        condition: service_healthy
    networks:
      - retailiq-net
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/actuator/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  retailiq-analytics:
    build:
      context: ./retailiq-analytics
      dockerfile: Dockerfile
    container_name: retailiq-analytics
    restart: always
    environment:
      DB_URL: mysql+pymysql://root:${DB_PASSWORD:-password}@retailiq-db:3306/${DB_NAME:-retailiq}
    ports:
      - "8000:8000"
    depends_on:
      retailiq-db:
        condition: service_healthy
    networks:
      - retailiq-net

  retailiq-frontend:
    build:
      context: ./retailiq-frontend
      dockerfile: Dockerfile
    container_name: retailiq-frontend
    restart: always
    environment:
      VITE_API_BASE_URL: http://localhost:8080/api/v1
    ports:
      - "3000:3000"
    networks:
      - retailiq-net

  retailiq-nginx:
    image: nginx:alpine
    container_name: retailiq-nginx
    restart: always
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
    ports:
      - "80:80"
      - "443:443"
    depends_on:
      - retailiq-api
      - retailiq-frontend
    networks:
      - retailiq-net

networks:
  retailiq-net:
    driver: bridge

volumes:
  mysql_data:
