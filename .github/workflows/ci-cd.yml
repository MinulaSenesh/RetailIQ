name: RetailIQ CI/CD

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

env:
  REGISTRY: ghcr.io
  IMAGE_API: ghcr.io/minulasenesh/retailiq/retailiq-api
  IMAGE_ANALYTICS: ghcr.io/minulasenesh/retailiq/retailiq-analytics
  IMAGE_FRONTEND: ghcr.io/minulasenesh/retailiq/retailiq-frontend

jobs:
  test-api:
    name: Spring Boot API Tests
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: retailiq-api
    steps:
      - uses: actions/checkout@v4
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: "17"
          distribution: "temurin"
          cache: "maven"
      - name: Run tests
        run: mvn test --no-transfer-progress
      - name: Build JAR
        run: mvn package -DskipTests --no-transfer-progress

  test-analytics:
    name: Python Analytics Tests
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: retailiq-analytics
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"
      - name: Install dependencies
        run: pip install -r requirements.txt
      - name: Run tests
        run: python -m pytest tests/ -v --tb=short

  test-frontend:
    name: React Frontend Tests
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: retailiq-frontend
    steps:
      - uses: actions/checkout@v4
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: retailiq-frontend/package-lock.json
      - name: Install dependencies
        run: npm ci
      - name: Lint
        run: npm run lint --if-present
      - name: Build
        run: npm run build

  docker-build-push:
    name: Build & Push Docker Images
    runs-on: ubuntu-latest
    needs: [test-api, test-analytics, test-frontend]
    if: github.ref == 'refs/heads/main'
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4
      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
      - name: Build & push API image
        uses: docker/build-push-action@v5
        with:
          context: ./retailiq-api
          push: true
          tags: ${{ env.IMAGE_API }}:${{ github.sha }},${{ env.IMAGE_API }}:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max
      - name: Build & push Analytics image
        uses: docker/build-push-action@v5
        with:
          context: ./retailiq-analytics
          push: true
          tags: ${{ env.IMAGE_ANALYTICS }}:${{ github.sha }},${{ env.IMAGE_ANALYTICS }}:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max
      - name: Build & push Frontend image
        uses: docker/build-push-action@v5
        with:
          context: ./retailiq-frontend
          push: true
          tags: ${{ env.IMAGE_FRONTEND }}:${{ github.sha }},${{ env.IMAGE_FRONTEND }}:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

