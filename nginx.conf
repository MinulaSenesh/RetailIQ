worker_processes 1;

events {
    worker_connections 1024;
}

http {
    include       mime.types;
    default_type  application/octet-stream;
    sendfile        on;
    keepalive_timeout  65;

    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml application/xml+rss text/javascript;

    server {
        listen 80;
        server_name localhost;

        # Frontend
        location / {
            proxy_pass http://retailiq-frontend:3000;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # Backend API
        location /api/v1 {
            proxy_pass http://retailiq-api:8080/api/v1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # Swagger API Docs
        location /api/docs {
            proxy_pass http://retailiq-api:8080/api/docs;
            proxy_set_header Host $host;
        }

        # Analytics Microservice (Internal/ML endpoints)
        location /analytics {
            proxy_pass http://retailiq-analytics:8000;
            proxy_set_header Host $host;
        }
    }
}
