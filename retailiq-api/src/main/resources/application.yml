server:
  port: ${PORT:8080}
  tomcat:
    basedir: .

spring:
  application:
    name: retailiq-api
  
  datasource:
    url: jdbc:mysql://${DB_HOST:localhost}:${DB_PORT:3306}/${DB_NAME:retailiq}?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
    username: ${DB_USER:root}
    password: ${DB_PASSWORD:root123}
    driver-class-name: com.mysql.cj.jdbc.Driver

  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.MySQLDialect

  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true
    validate-on-migrate: false

  servlet:
    multipart:
      max-file-size: 50MB
      max-request-size: 50MB
      location: ./uploads/temp

# JWT Configuration
jwt:
  secret: ${JWT_SECRET:404E635266556A586E3272357538782F413F4428472B4B6250645367566B5970}
  expiration: 86400000 # 24 hours
  refresh-expiration: 604800000 # 7 days

logging:
  level:
    root: INFO
    com.retailiq.api: DEBUG
    org.springframework.security: INFO

# Analytics microservice
analytics:
  service:
    url: ${ANALYTICS_SERVICE_URL:http://127.0.0.1:8000}

# File upload storage path
upload:
  storage:
    path: ${UPLOAD_PATH:./uploads}
